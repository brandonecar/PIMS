databases:
  - name: pims-db
    plan: free
    databaseName: pims_optimizer
    user: pims

services:
  - type: web
    name: pims-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pims-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://your-app.vercel.app"]'
      - key: SEED_DEMO_DATA
        value: "true"
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /api/health
